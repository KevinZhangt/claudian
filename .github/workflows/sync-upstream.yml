name: Sync Upstream and Release

on:
  schedule:
    # 每天检查两次上游更新 (北京时间 10:00 和 22:00)
    - cron: '0 2,14 * * *'
  workflow_dispatch:  # 允许手动触发
  repository_dispatch:
    types: [upstream-release]  # 可以通过 webhook 触发

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: feature/shell_default_env
          fetch-depth: 0  # 获取完整历史
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/YishenTu/claudian.git || true
          git fetch upstream --tags

      - name: Check for upstream updates
        id: check_updates
        run: |
          # 只取上游的 tag（排除含 _fix 的本地 tag）
          UPSTREAM_TAG=$(git tag --sort=-version:refname \
            | grep -v "_fix" \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | head -1 || echo "")
          # 获取本地最新的非 _fix tag（对应上游已同步过的版本）
          LOCAL_TAG=$(git tag -l | grep -v "_fix" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1 || echo "")

          echo "upstream_tag=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
          echo "local_tag=$LOCAL_TAG" >> $GITHUB_OUTPUT

          if [ -z "$UPSTREAM_TAG" ]; then
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "No upstream tags found"
            exit 0
          fi

          if [ "$UPSTREAM_TAG" = "$LOCAL_TAG" ]; then
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "Already up to date: $LOCAL_TAG"
          else
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "New upstream version: $UPSTREAM_TAG (current: $LOCAL_TAG)"
          fi

      - name: Merge upstream changes
        if: steps.check_updates.outputs.has_updates == 'true'
        id: merge
        run: |
          UPSTREAM_TAG="${{ steps.check_updates.outputs.upstream_tag }}"

          if git merge upstream/main --no-edit --allow-unrelated-histories; then
            echo "merged=true" >> $GITHUB_OUTPUT
            echo "✅ 合并成功: upstream/main"
          else
            # 合并失败：取消并让后续 step 创建 Issue 通知，不强行解决
            git merge --abort
            echo "merged=false" >> $GITHUB_OUTPUT
            echo "::error::合并冲突，需手动解决后重跑 workflow"
          fi

      - name: 冲突时创建 Issue 并终止
        if: steps.check_updates.outputs.has_updates == 'true' && steps.merge.outputs.merged == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ 合并冲突：upstream ${{ steps.check_updates.outputs.upstream_tag }}`,
              body: [
                '自动同步上游时发生合并冲突，需要手动解决。',
                '',
                '**操作步骤：**',
                '```bash',
                'git fetch upstream',
                'git checkout feature/shell_default_env',
                'git merge upstream/main',
                '# 解决冲突后：',
                'git add . && git commit',
                'git push origin feature/shell_default_env',
                '```',
                '',
                `Workflow 运行记录：https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ].join('\n'),
              labels: ['sync', 'conflict'],
            });
            core.setFailed('合并冲突，已创建 Issue，终止构建');

      - name: 合并后恢复自定义 patch
        if: steps.check_updates.outputs.has_updates == 'true' && steps.merge.outputs.merged == 'true'
        run: |
          # upstream 合并后会重置 manifest.json name，强制恢复
          sed -i 's/"name": "Claudian"/"name": "Claudian Enhance"/' manifest.json

          # 验证 getShellPath patch 是否还存在（upstream 不会改 env.ts，正常不会丢）
          if ! grep -q "getShellPath" src/utils/env.ts; then
            echo "::error::getShellPath patch 丢失，请检查 src/utils/env.ts"
            exit 1
          fi

          # 提交恢复的自定义内容（如果有变更）
          git diff --quiet && echo "无需恢复" || (
            git add manifest.json
            git commit -m "chore: restore custom patches after upstream merge"
          )
          echo "✅ 自定义 patch 完整"

      - name: Setup Node 20
        if: steps.check_updates.outputs.has_updates == 'true' && steps.merge.outputs.merged == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        if: steps.check_updates.outputs.has_updates == 'true' && steps.merge.outputs.merged == 'true'
        run: npm ci

      - name: Run tests
        if: steps.check_updates.outputs.has_updates == 'true' && steps.merge.outputs.merged == 'true'
        run: npm run test -- --selectProjects unit
        continue-on-error: true  # 测试失败不阻止发布，但会记录

      - name: Build
        if: steps.check_updates.outputs.has_updates == 'true' && steps.merge.outputs.merged == 'true'
        run: npm run build

      - name: Create new version tag
        if: steps.check_updates.outputs.has_updates == 'true'
        id: create_tag
        run: |
          UPSTREAM_TAG="${{ steps.check_updates.outputs.upstream_tag }}"
          # 给新版本添加 _fix 后缀
          NEW_TAG="${UPSTREAM_TAG}_fix"

          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

          # _fix 后缀不是合法 semver，直接更新 manifest.json 版本字段
          sed -i "s/\"version\": \".*\"/\"version\": \"${UPSTREAM_TAG}\"/" manifest.json

          git add manifest.json
          git commit -m "chore: bump version to $NEW_TAG (synced from upstream $UPSTREAM_TAG)" || true

          # 创建 tag
          git tag $NEW_TAG

          echo "Created new tag: $NEW_TAG"

      - name: Push changes
        if: steps.check_updates.outputs.has_updates == 'true' && steps.merge.outputs.merged == 'true'
        run: |
          git push origin feature/shell_default_env
          git push origin ${{ steps.create_tag.outputs.new_tag }}

      - name: Get changelog
        if: steps.check_updates.outputs.has_updates == 'true' && steps.merge.outputs.merged == 'true'
        id: changelog
        run: |
          LOCAL_TAG="${{ steps.check_updates.outputs.local_tag }}"
          if [ -n "$LOCAL_TAG" ]; then
            CHANGELOG=$(git log ${LOCAL_TAG}..HEAD --pretty=format:"- %s" --no-merges | head -20)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" --no-merges | head -20)
          fi

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "## 🔄 Upstream Sync" >> $GITHUB_OUTPUT
          echo "Synced from upstream version: ${{ steps.check_updates.outputs.upstream_tag }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "## 🔧 Custom Patches" >> $GITHUB_OUTPUT
          echo "- Shell environment variable loading fix (loads ~/.zshenv and ~/.bashrc)" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.check_updates.outputs.has_updates == 'true' && steps.merge.outputs.merged == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.create_tag.outputs.new_tag }}
          name: Release ${{ steps.create_tag.outputs.new_tag }}
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.notes }}

            **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ steps.check_updates.outputs.local_tag }}...${{ steps.create_tag.outputs.new_tag }}
          files: |
            main.js
            manifest.json
            styles.css

      - name: Notify on Slack (Optional)
        if: steps.check_updates.outputs.has_updates == 'true' && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST $SLACK_WEBHOOK_URL -H 'Content-Type: application/json' -d '{
            "text": "🚀 Claudian fork synced to version ${{ steps.create_tag.outputs.new_tag }}"
          }'

  # 如果同步失败，创建一个 issue
  create-issue-on-failure:
    runs-on: ubuntu-latest
    needs: sync
    if: failure()
    permissions:
      issues: write
    steps:
      - name: Create issue for failed sync
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Upstream sync failed',
              body: `The automatic sync from upstream failed. Please check the [workflow run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
              labels: ['sync', 'automated']
            })
